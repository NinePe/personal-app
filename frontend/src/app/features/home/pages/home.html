<div class="home-page">
  <div class="home-header">
    <h1 class="home-greeting">{{ greeting() }}</h1>
    <p class="home-subtitle">{{ subtitle() }}</p>
  </div>

  <div class="home-grid">
    @for (mod of modules(); track mod.id) {
      <div class="module-card" (click)="navigate(mod.route)">
        <div class="module-icon-wrap" [style.background-color]="tokens(mod.color).iconBg">
          @switch (mod.icon) {
            @case ('book') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   [style.color]="tokens(mod.color).iconColor">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
              </svg>
            }
            @case ('film') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   [style.color]="tokens(mod.color).iconColor">
                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                <line x1="7" y1="2" x2="7" y2="22"/>
                <line x1="17" y1="2" x2="17" y2="22"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <line x1="2" y1="7" x2="7" y2="7"/>
                <line x1="2" y1="17" x2="7" y2="17"/>
                <line x1="17" y1="17" x2="22" y2="17"/>
                <line x1="17" y1="7" x2="22" y2="7"/>
              </svg>
            }
            @case ('wallet') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   [style.color]="tokens(mod.color).iconColor">
                <path d="M20 12V22H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h16v4"/>
                <path d="M20 12a2 2 0 0 0-2-2H4"/>
                <circle cx="18" cy="12" r="2"/>
              </svg>
            }
            @case ('chart') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   [style.color]="tokens(mod.color).iconColor">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                <polyline points="16 7 22 7 22 13"/>
              </svg>
            }
            @case ('leaf') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   [style.color]="tokens(mod.color).iconColor">
                <path d="M12 22c4-4 8-8 8-13A8 8 0 0 0 4 9c0 5 4 9 8 13z"/>
                <path d="M12 22V12"/>
              </svg>
            }
          }
        </div>

        <div class="module-text">
          <p class="module-name">{{ mod.name }}</p>
          <p class="module-status">{{ mod.status }}</p>
        </div>

        <button class="module-btn" [style.background-color]="tokens(mod.color).btnBg"
                (click)="$event.stopPropagation(); navigate(mod.route)">
          Enter →
        </button>
      </div>
    }
  </div>
</div>
